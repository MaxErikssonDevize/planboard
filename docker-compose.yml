services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: planboard
      POSTGRES_PASSWORD: planboard
      POSTGRES_DB: planboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planboard"]
      interval: 5s
      timeout: 3s
      retries: 5

  planboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://planboard:planboard@db:5432/planboard
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
